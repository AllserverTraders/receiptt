<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AllServe Traders · Invoice & Quotation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: #f2f4f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 1200px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1);
            padding: 2rem 2rem 2.5rem;
        }
        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #1e2f4d;
            text-align: center;
            margin-bottom: 0.25rem;
        }
        .subtitle {
            text-align: center;
            color: #5c6f87;
            margin-bottom: 10px;
        }
        .mode-bar {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 1rem 0 0.5rem;
        }
        .mode-btn {
            background: none;
            border: 2px solid #d0d9e4;
            padding: 0.6rem 2rem;
            border-radius: 40px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #2c3e5c;
            cursor: pointer;
            transition: 0.2s;
        }
        .mode-btn.active {
            background: #1e2f4d;
            border-color: #1e2f4d;
            color: white;
        }
        .doc-badge {
            text-align: center;
            font-size: 1.2rem;
            margin: 5px auto 20px;
            background: #eef2f6;
            padding: 8px 30px;
            border-radius: 40px;
            display: inline-block;
        }
        /* PAID TOGGLE – appears only in invoice mode */
        .paid-toggle-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 10px 0 20px;
            padding: 8px 20px;
            background: #f8fafd;
            border-radius: 50px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
            background: #d0d9e4;
            border-radius: 30px;
            border: 2px solid #a0b3cc;
            transition: 0.2s;
            cursor: pointer;
        }
        .toggle-switch.active {
            background: #1e2f4d;
            border-color: #0f1f33;
        }
        .toggle-slider {
            position: absolute;
            height: 26px;
            width: 26px;
            background: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: 0.2s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }
        .toggle-switch.active .toggle-slider {
            left: 32px;
        }
        .paid-label {
            font-weight: 600;
            color: #1e2f4d;
            font-size: 1.1rem;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem 2rem;
        }
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .field-group label {
            font-weight: 600;
            color: #1f3a5f;
            font-size: 0.9rem;
        }
        input, select {
            padding: 10px 14px;
            border: 1.5px solid #cfddee;
            border-radius: 16px;
            font-size: 1rem;
            width: 100%;
            margin-top: 6px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #2b4f8e;
            box-shadow: 0 0 0 3px rgba(30,47,77,0.1);
        }
        .section-title {
            grid-column: span 2;
            font-weight: 700;
            color: #1e2f4d;
            margin-top: 10px;
            border-bottom: 2px solid #dde3ec;
            padding-bottom: 4px;
            font-size: 1.2rem;
        }
        .generate-btn {
            grid-column: span 2;
            background: #1e2f4d;
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 60px;
            margin-top: 25px;
            cursor: pointer;
            transition: 0.2s;
        }
        .generate-btn:hover {
            background: #2b405f;
        }
        .note {
            grid-column: span 2;
            font-size: 0.85rem;
            color: #5c6f87;
            text-align: center;
            margin-top: 10px;
        }
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .section-title,
            .generate-btn,
            .note {
                grid-column: span 1;
            }
        }
        .soft-text {
            color: #3d5675;
            font-size: 0.9rem;
            font-weight: normal;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>🛠️ AllServe Traders</h1>
    <div class="subtitle">Invoice & Quotation Generator · selling made simple</div>

    <div class="mode-bar">
        <button class="mode-btn" id="invoiceModeBtn" onclick="setMode('invoice')">📄 Invoice</button>
        <button class="mode-btn" id="quotationModeBtn" onclick="setMode('quotation')">📋 Quotation</button>
    </div>

    <div style="text-align:center;">
        <span class="doc-badge" id="documentType">Invoice</span>
    </div>

    <!-- PAID TOGGLE – visible only for invoice -->
    <div id="paidToggleArea" class="paid-toggle-container" style="display: flex;">
        <span class="paid-label">Mark as PAID</span>
        <div id="toggleSwitch" class="toggle-switch" onclick="togglePaid()">
            <div class="toggle-slider"></div>
        </div>
    </div>

    <div class="form-grid">
        <!-- client & delivery -->
        <div class="field-group">
            <label>Client Name</label>
            <input type="text" id="clientName" placeholder="Enter client name">
        </div>
        <div class="field-group">
            <label>Delivery / notes</label>
            <select id="deliveryType">
                <option value="standard">Standard (no extra)</option>
                <option value="priority">Priority handling (+R20 on some items)</option>
            </select>
        </div>

        <!-- ========= PPE SECTION ========= -->
        <div class="section-title">🧤 PPE</div>
        <div class="field-group"><label>Short-Cut Boots (R340)</label><input type="number" id="bootsShort" min="0" value="0"></div>
        <div class="field-group"><label>High-Cut Boots (R420)</label><input type="number" id="bootsHigh" min="0" value="0"></div>
        <div class="field-group"><label>Lace-less Boots (R450)</label><input type="number" id="bootsLaceless" min="0" value="0"></div>
        <div class="field-group"><label>Standard Navy Work Suit (R220)</label><input type="number" id="suitNavy" min="0" value="0"></div>
        <div class="field-group"><label>Fire Resistant Work Suit (R400)</label><input type="number" id="suitFire" min="0" value="0"></div>
        <div class="field-group"><label>Laboratory Coat (R150)</label><input type="number" id="labCoat" min="0" value="0"></div>
        <div class="field-group"><label>Goggles (R40)</label><input type="number" id="goggles" min="0" value="0"></div>
        <div class="field-group"><label>Gloves (R30)</label><input type="number" id="gloves" min="0" value="0"></div>

        <!-- PPE combos -->
        <div class="field-group"><label>🔥 Fire Suit + goggles + gloves (R450)</label><input type="number" id="comboFire" min="0" value="0"></div>
        <div class="field-group"><label>🔵 Navy Suit + goggles + gloves (R270)</label><input type="number" id="comboNavy" min="0" value="0"></div>

        <!-- ========= SOFTWARE ========= -->
        <div class="section-title">💻 Software installations</div>
        <div class="field-group"><label>Windows 10/11 installation (R200)</label><input type="number" id="winInstall" min="0" value="0"></div>

        <!-- ========= LOANS ========= -->
        <div class="section-title">💰 Loans (amount paid)</div>
        <div class="field-group"><label>Amount paid by client (R)</label><input type="number" id="loanPaid" min="0" value="0" step="0.01" placeholder="e.g. 500"></div>

        <!-- ========= ELECTRONICS ========= -->
        <div class="section-title">🔌 Electronics & cables</div>
        <div class="field-group"><label>5m Extension (R75)</label><input type="number" id="ext5" min="0" value="0"></div>
        <div class="field-group"><label>5m Heavy duty Extension (R85)</label><input type="number" id="extHD" min="0" value="0"></div>
        <div class="field-group"><label>Type C Laptop charger (R250)</label><input type="number" id="chargerLaptopC" min="0" value="0"></div>
        <div class="field-group"><label>Universal laptop charger (R150)</label><input type="number" id="chargerUniversal" min="0" value="0"></div>
        <div class="field-group"><label>Screen protector (R40)</label><input type="number" id="screenProtector" min="0" value="0"></div>
        <div class="field-group"><label>C type complete charger (R100)</label><input type="number" id="chargerCComplete" min="0" value="0"></div>
        <div class="field-group"><label>Complete iPhone charger (R110)</label><input type="number" id="chargerIPhone" min="0" value="0"></div>
        <div class="field-group"><label>Type C to Type C cable (R55)</label><input type="number" id="cableCtoC" min="0" value="0"></div>
        <div class="field-group"><label>Type C – Lightning cable (R60)</label><input type="number" id="cableCtoLight" min="0" value="0"></div>
        <div class="field-group"><label>30W fast charge adapter (R65)</label><input type="number" id="fastAdapter" min="0" value="0"></div>

        <button class="generate-btn" onclick="generatePDF()">📄 Generate & Share Document</button>
        <div class="note">AllServe Traders – quality products & support. Thank you for your business!</div>
    </div>
</div>

<script>
    // ------ GLOBAL MODE & PAID TOGGLE ------
    let mode = "invoice";
    let paidEnabled = false;

    const docTypeSpan = document.getElementById("documentType");
    const invoiceBtn = document.getElementById("invoiceModeBtn");
    const quotationBtn = document.getElementById("quotationModeBtn");
    const paidToggleArea = document.getElementById("paidToggleArea");
    const toggleSwitch = document.getElementById("toggleSwitch");

    function setMode(selectedMode) {
        mode = selectedMode;
        if (mode === "invoice") {
            invoiceBtn.classList.add("active");
            quotationBtn.classList.remove("active");
            docTypeSpan.innerText = "Invoice";
            paidToggleArea.style.display = "flex";
        } else {
            quotationBtn.classList.add("active");
            invoiceBtn.classList.remove("active");
            docTypeSpan.innerText = "Quotation";
            paidToggleArea.style.display = "none";
            paidEnabled = false;
            toggleSwitch.classList.remove("active");
        }
    }

    function togglePaid() {
        if (mode !== "invoice") return;
        paidEnabled = !paidEnabled;
        if (paidEnabled) {
            toggleSwitch.classList.add("active");
        } else {
            toggleSwitch.classList.remove("active");
        }
    }

    setMode("invoice");

    // ------ DOCUMENT NUMBERING ------
    function getNextDocumentNumber() {
        let storageKey = mode === "invoice" ? "AST_invoiceCounter" : "AST_quotationCounter";
        let lastNumber = parseInt(localStorage.getItem(storageKey));
        if (isNaN(lastNumber) || lastNumber < 70) {
            lastNumber = 70;
        } else {
            lastNumber += 1;
        }
        localStorage.setItem(storageKey, lastNumber);
        return String(lastNumber).padStart(3, "0");
    }

    // ------ PRICE LISTS ------
    const ppeItems = {
        bootsShort: 340, bootsHigh: 420, bootsLaceless: 450,
        suitNavy: 220, suitFire: 400, labCoat: 150,
        goggles: 40, gloves: 30,
        comboFire: 450,
        comboNavy: 270
    };

    const softwareItems = { winInstall: 200 };
    const electronicsItems = {
        ext5: 75, extHD: 85, chargerLaptopC: 250, chargerUniversal: 150,
        screenProtector: 40, chargerCComplete: 100, chargerIPhone: 110,
        cableCtoC: 55, cableCtoLight: 60, fastAdapter: 65
    };

    const displayNames = {
        bootsShort: "Short-Cut Boots", bootsHigh: "High-Cut Boots", bootsLaceless: "Lace-less Boots",
        suitNavy: "Standard Navy Work Suit", suitFire: "Fire Resistant Work Suit",
        labCoat: "Laboratory Coat", goggles: "Goggles", gloves: "Gloves",
        comboFire: "COMBO: Fire suit + goggles + gloves",
        comboNavy: "COMBO: Navy suit + goggles + gloves",
        winInstall: "Windows 10/11 Installation",
        ext5: "5m Extension", extHD: "5m Heavy Duty Extension",
        chargerLaptopC: "Type C Laptop Charger", chargerUniversal: "Universal Laptop Charger",
        screenProtector: "Screen Protector", chargerCComplete: "C Type Complete Charger",
        chargerIPhone: "Complete iPhone Charger", cableCtoC: "Type C to Type C Cable",
        cableCtoLight: "Type C – Lightning Cable", fastAdapter: "30W Fast Charge Adapter"
    };

    // ------ PDF GENERATION ------
    function generatePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();

        let client = document.getElementById("clientName").value || "N/A";
        let deliveryType = document.getElementById("deliveryType").value;
        let deliveryExtra = (deliveryType === "priority") ? 20 : 0;

        let today = new Date().toLocaleDateString("en-ZA");
        let numberFormatted = getNextDocumentNumber();
        let docNumber = (mode === "invoice" ? "AST-INV-" : "AST-QUO-") + numberFormatted;
        let title = mode === "invoice" ? "INVOICE" : "QUOTATION";

        // Load images (updated file names)
        const logo = new Image();
        const paidImg = new Image();   // previously stamp.jpg, now paid.png
        const signature = new Image();
        logo.src = "assets/logo.jpeg";
        paidImg.src = "assets/paid.png";
        signature.src = "assets/signature.jpeg";

        let imagesLoaded = 0;
        function tryGenerate() {
            imagesLoaded++;
            if (imagesLoaded === 3) buildPDF();
        }
        logo.onload = tryGenerate;
        paidImg.onload = tryGenerate;
        signature.onload = tryGenerate;
        // fallback if images missing
        setTimeout(() => { if (imagesLoaded < 3) imagesLoaded = 3; buildPDF(); }, 500);

        function buildPDF() {
            let y = 20;

            // ----- HEADER -----
            try { doc.addImage(logo, "JPEG", 15, 10, 35, 25); } catch (e) { console.warn("logo missing"); }
            doc.setFontSize(18);
            doc.setFont(undefined, "bold");
            doc.text("AllServe Traders", 60, 20);
            doc.setFont(undefined, "normal");
            doc.setFontSize(9);
            doc.text("Your one-stop shop: PPE, software, electronics", 60, 27);
            doc.text("Cell: 072 550 0640 · info@allserve.co.za", 60, 33);

            doc.setFontSize(16);
            doc.text(title, 150, 20);
            doc.setFontSize(10);
            doc.text("No: " + docNumber, 150, 28);
            doc.text("Date: " + today, 150, 35);

            y = 45;
            doc.line(15, y, 195, y);
            y += 8;

            doc.text("Bill To:", 15, y);
            y += 5;
            doc.text(client, 15, y);
            y += 8;
            doc.line(15, y, 195, y);
            y += 8;

            // Table header
            doc.text("Item", 15, y);
            doc.text("Qty", 105, y);
            doc.text("Unit", 135, y);
            doc.text("Total", 170, y);
            y += 4;
            doc.line(15, y, 195, y);
            y += 6;

            let grandTotal = 0;

            function addRow(label, qty, unitPrice) {
                if (qty && qty > 0) {
                    let total = qty * unitPrice;
                    grandTotal += total;
                    doc.text(label, 15, y);
                    doc.text(qty.toString(), 105, y);
                    doc.text("R" + unitPrice.toFixed(2), 135, y);
                    doc.text("R" + total.toFixed(2), 170, y);
                    y += 8;
                }
            }

            // PPE
            for (let id in ppeItems) {
                let qty = parseInt(document.getElementById(id)?.value) || 0;
                if (qty > 0) addRow(displayNames[id] || id, qty, ppeItems[id]);
            }

            // Software
            for (let id in softwareItems) {
                let qty = parseInt(document.getElementById(id)?.value) || 0;
                if (qty > 0) addRow(displayNames[id], qty, softwareItems[id]);
            }

            // Electronics
            for (let id in electronicsItems) {
                let qty = parseInt(document.getElementById(id)?.value) || 0;
                if (qty > 0) addRow(displayNames[id], qty, electronicsItems[id]);
            }

            // Loan payment
            let loanPaid = parseFloat(document.getElementById("loanPaid")?.value) || 0;
            if (loanPaid > 0) {
                doc.text("Loan payment (received)", 15, y);
                doc.text("", 105, y);
                doc.text("", 135, y);
                doc.text("-R" + loanPaid.toFixed(2), 170, y);
                y += 8;
                grandTotal -= loanPaid;
            }

            if (deliveryExtra > 0) {
                doc.text("Priority handling fee", 15, y);
                doc.text("1", 105, y);
                doc.text("R" + deliveryExtra.toFixed(2), 135, y);
                doc.text("R" + deliveryExtra.toFixed(2), 170, y);
                y += 8;
                grandTotal += deliveryExtra;
            }

            doc.line(130, y-2, 195, y-2);
            doc.setFont(undefined, "bold");
            doc.setFontSize(13);
            let totalY = y + 2;

            if (mode === "invoice" && paidEnabled) {
                doc.text(" TOTAL: R" + grandTotal.toFixed(2) + "  ✅ PAID", 105, totalY);
            } else {
                doc.text(" TOTAL: R" + grandTotal.toFixed(2), 130, totalY);
            }
            doc.setFont(undefined, "normal");

            // Footer with images
            let pageHeight = doc.internal.pageSize.height;
            let footerY = pageHeight - 45;

            // Add paid.png (stamp) and signature
            try { doc.addImage(paidImg, "PNG", 15, footerY-10, 25, 20); } catch (e) { console.warn("paid.png missing"); }
            try { doc.addImage(signature, "JPEG", 45, footerY-10, 30, 15); } catch (e) { console.warn("signature missing"); }

            doc.setFontSize(10);
            doc.text("Authorized signature & stamp", 15, footerY + 12);
            doc.text("Thanks for your support! 🤝 AllServe Traders", 100, footerY + 12);

            doc.setFontSize(9);
            doc.text("Bank: Capitec | Acc: AllServe Trading | Acc No: 1234567890 | Cell: 072 550 0640", 15, pageHeight - 15);

            // Generate and share
            const pdfBlob = doc.output("blob");
            const fileName = docNumber + ".pdf";
            const pdfUrl = URL.createObjectURL(pdfBlob);
            const a = document.createElement("a");
            a.href = pdfUrl;
            a.download = fileName;
            a.click();

            const file = new File([pdfBlob], fileName, { type: "application/pdf" });
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                navigator.share({
                    title: title + " from AllServe",
                    text: "Document from AllServe Traders",
                    files: [file]
                }).catch(() => {});
            }
        }
    }
</script>
</body>
</html>
